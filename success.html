<div class="container" style="text-align:center; padding-top:150px;">
    <div class="glass-card" style="max-width:500px; margin:0 auto;">
        <h2 style="color:var(--success);">Payment Successful!</h2>
        <p style="margin:20px 0; color:#94a3b8;">Your 2026 AI Intelligence assets are ready for immediate download.</p>
        
        <div id="product-delivery-zone">
            <p>Syncing your secure link...</p>
        </div>
    </div>
</div>

<script>
    window.onload = () => {
        // 1. Get the product info from the phone's memory
        const lastProduct = JSON.parse(localStorage.getItem('last_clicked_product'));
        const displayArea = document.getElementById('product-delivery-zone');

        if (lastProduct && lastProduct.download) {
            displayArea.innerHTML = `
                <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; border:1px solid var(--border);">
                    <h4 style="margin-bottom:15px;">${lastProduct.name}</h4>
                    <a href="${lastProduct.download}" target="_blank" class="btn-main" 
                       style="background:var(--success); color:white; display:block; text-decoration:none;">
                       📥 DOWNLOAD PDF NOW
                    </a>
                </div>
            `;
            // Optional: Clear memory after 5 minutes for security
            setTimeout(() => { localStorage.removeItem('last_clicked_product'); }, 300000);
        } else {
            displayArea.innerHTML = `<p>Order details not found. Please check your email for your link.</p>`;
        }
    };
</script>
