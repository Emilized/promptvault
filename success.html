<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success! | PromptVault USA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="spotlight"></div>
    <div class="container" style="text-align:center; padding-top:100px;">
        <div class="glass-card">
            <h1 style="color:var(--success);">Payment Successful! 🎉</h1>
            <p style="color:#cbd5e1; margin-bottom:30px;">Thank you for your purchase. Your AI Prompt Pack is ready.</p>
            
            <a id="download-link" href="#" class="btn-main" style="background:var(--accent); color:black; display:inline-block; max-width:300px;">
                Download PDF Now
            </a>
            
            <p style="margin-top:30px;"><a href="index.html" style="color:var(--secondary);">Back to Member Vault</a></p>
        </div>
    </div>

    <script>
        // This looks at the URL: success.html?file=business-pack
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if(fileName) {
            // It points the button to the assets/downloads folder
            document.getElementById('download-link').href = 'assets/downloads/' + fileName + '.pdf';
        } else {
            document.getElementById('download-link').innerText = "Contact Support";
        }
    </script>
</body>
</html>
