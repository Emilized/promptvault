<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PromptVault USA | AI Wealth Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#020617;
    --card:#0f172a;
    --primary:#3b82f6;
    --accent:#06b6d4;
    --gold:#f59e0b;
    --text:#e2e8f0;
    --muted:#64748b;
    --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background: radial-gradient(circle at 20% 10%, rgba(59,130,246,0.15), transparent 40%), var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    position:sticky;
    top:0;
    backdrop-filter:blur(20px);
    background:rgba(2,6,23,0.7);
    border-bottom:1px solid var(--border);
}

.logo{
    display:flex;
    gap:10px;
    align-items:center;
    font-weight:800;
}

.logo img{
    width:36px;
    border-radius:10px;
}

/* BUTTONS */
.btn{
    padding:14px;
    border-radius:40px;
    font-weight:700;
    border:none;
    cursor:pointer;
    transition:.3s;
}

.btn-primary{
    background:linear-gradient(135deg,var(--primary),var(--accent));
    color:white;
}

.btn-primary:hover{
    transform:scale(1.05);
}

.btn-outline{
    background:transparent;
    border:1px solid var(--border);
    color:white;
}

/* HERO */
.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:2.8rem;
    font-weight:800;
    line-height:1;
}

.hero span{
    color:var(--accent);
    font-weight:600;
}

.hero p{
    margin-top:10px;
    color:var(--muted);
}

/* CARD */
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:25px;
    padding:20px;
    margin:20px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* PRICE */
.price{
    font-size:2.5rem;
    font-weight:800;
    margin:10px 0;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

/* NAV */
nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(15,23,42,0.95);
    padding:15px 0;
    border-top:1px solid var(--border);
}

.nav-item{
    font-size:0.7rem;
    color:var(--muted);
    text-align:center;
}

.nav-item.active{
    color:var(--accent);
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#020617;
    color:white;
    margin-bottom:15px;
}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* ANIMATION */
.fade{
    animation:fade .6s ease;
}
@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
PromptVault
</div>
<button class="btn btn-outline" onclick="openModal()">Sign In</button>
</header>

<!-- HOME -->
<div id="home" class="page active fade">

<div class="hero">
<h1>Command the <br><span>AI Economy</span></h1>
<p>Premium prompts engineered for profit</p>
</div>

<div class="card">
<h3>🚀 VIP Vault Access</h3>
<div class="price" id="price">$9/mo</div>
<button class="btn btn-primary" style="width:100%">Unlock Everything</button>
</div>

<div class="card">
<h4>🎁 Free AI Starter Kit</h4>
<p style="color:var(--muted);font-size:0.8rem;">5 high-converting prompts</p>
<button class="btn btn-outline" style="width:100%" onclick="handleClaim()">Claim Now</button>
</div>

</div>

<!-- VAULTS -->
<div id="vaults" class="page fade">
<div class="card">
<h3>🎯 Hyper-Realism Pack</h3>
<div class="price">$15</div>
<button class="btn btn-primary" style="width:100%">Buy Now</button>
</div>
</div>

<!-- LAB -->
<div id="lab" class="page fade">
<div class="card">
<h2>AI Prompt Lab</h2>
<input id="niche" placeholder="Enter niche (e.g. fitness)">
<button class="btn btn-primary" onclick="generate()">Generate</button>

<div id="output" style="margin-top:15px;color:var(--accent);font-family:monospace;"></div>
</div>
</div>

<!-- ACADEMY -->
<div id="academy" class="page fade">
<div class="card">
<h2>Prompt Academy</h2>
<div class="grid">
<div class="card">DNA Logic</div>
<div class="card">Hooks</div>
</div>
</div>
</div>

<!-- NAV -->
<nav>
<div class="nav-item active" onclick="nav('home',this)">🏠 Home</div>
<div class="nav-item" onclick="nav('vaults',this)">💼 Vaults</div>
<div class="nav-item" onclick="nav('lab',this)">🧪 Lab</div>
<div class="nav-item" onclick="nav('academy',this)">📚 Academy</div>
</nav>

<script>
function nav(page,el){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');

document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
el.classList.add('active');
}

function generate(){
let niche=document.getElementById('niche').value;
if(!niche) return alert("Enter niche");

document.getElementById('output').innerText=
`[Elite ${niche} AI System]
→ Target audience analysis
→ Viral hooks
→ Monetization angle`;
}

function handleClaim(){
alert("Sign in to unlock your free kit");
}

function openModal(){
alert("Auth system here (connect Firebase)");
}
</script>

</body>
</html>
