<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Step 1: Fix Navigation Text Sizes */
        .bottom-nav .nav-item { 
            font-size: 1.4rem !important; /* Larger Icons */
            padding: 10px 0;
        }
        .bottom-nav .nav-item small { 
            font-size: 0.9rem !important; /* Larger Text */
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Styling for Step 3 & 4 */
        .payment-strip { display: flex; gap: 20px; justify-content: center; align-items: center; margin: 30px 0; opacity: 0.7; filter: grayscale(1); }
        .payment-strip img { height: 30px; }
        .review-box { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin: 10px; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="page active">
        <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 50px;">
            <div class="review-box">
                <p style="font-style: italic;">"The hyper-realistic prompts are insane. My affiliate sales tripled in 30 days."</p>
                <p><strong>- Alex R.</strong> ⭐⭐⭐⭐⭐</p>
            </div>
            <div class="review-box">
                <p style="font-style: italic;">"Best investment for my e-commerce brand in 2026. Plug and play!"</p>
                <p><strong>- Sarah M.</strong> ⭐⭐⭐⭐⭐</p>
            </div>
        </div>

        <div class="payment-strip">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Visa.svg" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
        </div>
    </div>

    <div id="browse" class="page">
        <div style="padding: 40px 0;">
            <div style="margin-bottom: 30px; display: flex; gap: 10px;">
                <input type="text" id="vault-search" placeholder="Search prompts..." style="flex: 1; padding: 15px 25px; border-radius: 50px; background: var(--glass); border: 1px solid var(--border); color: white; outline: none;">
            </div>

            <h2 style="font-size:2.5rem;">The <span class="highlight-text">Asset</span> Vault</h2>
            
            <div class="vault-grid" id="product-list" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:25px;"></div>
        </div>
    </div>
</div>

<div id="auth-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 7000; align-items: center; justify-content: center; padding: 20px;">
    <div class="auth-card" style="width: 100%; max-width: 400px; text-align: center; background: var(--glass); border: 1px solid var(--border); padding: 40px; border-radius: 30px;">
        <h2 style="margin-bottom: 20px;">Login / Sign Up</h2>
        
        <input type="email" id="email-field" placeholder="Email Address" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;">
        <input type="password" id="pass-field" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;">
        
        <button onclick="handleEmailAuth()" class="btn-main" style="background: var(--accent); margin-bottom: 15px;">Continue with Email</button>
        
        <div style="color: #64748b; margin-bottom: 15px;">OR</div>

        <button onclick="handleGoogle()" class="btn-main" style="background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 800;">
            Continue with Google
        </button>
        <button onclick="UI.modal('auth-overlay', 'close')" style="background: none; border: none; color: var(--accent); margin-top: 20px; cursor: pointer;">Maybe Later</button>
    </div>
</div>

<div id="checkout-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 6000; align-items: center; justify-content: center;">
    <div class="auth-card" style="width: 95%; max-width: 450px;">
        <h3 style="margin-top:0; text-align:center;">Checkout</h3>
        <div id="cart-items-list" style="max-height: 200px; overflow-y: auto; margin: 20px 0;"></div>
        
        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.4rem; border-top:1px solid var(--border); padding-top:15px; margin-bottom:25px;">
            <span>Total:</span>
            <span id="cart-total" style="color:var(--secondary)">$0.00</span>
        </div>

        <div id="paypal-button-container" style="min-height: 150px;"></div>

        <center><span style="color: #94a3b8; cursor:pointer;" onclick="UI.modal('checkout-overlay', 'close')">Close Window</span></center>
    </div>
</div>
